<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#0d5da8" />
<title>文法工場｜英文の部品を見つけて組み立てる</title>
<style>
:root{
  --ink:#17324d;--muted:#60758a;--paper:#f7fbff;--line:#cfe3f4;
  --blue:#1675d1;--blue2:#0d5da8;--red:#ef4d5b;--green:#36a96b;--purple:#8657d9;--yellow:#f5b82e;
  --shadow:0 14px 36px rgba(19,55,88,.13);--radius:24px;
}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;color:var(--ink);font-family:"Hiragino Sans","Yu Gothic",system-ui,sans-serif;background:
radial-gradient(circle at 15% 10%,#e7f6ff 0 12%,transparent 30%),radial-gradient(circle at 90% 20%,#fff2cc 0 10%,transparent 26%),linear-gradient(180deg,#f8fcff,#eef7ff 56%,#f9fcff);min-height:100vh}
button{font:inherit}button:focus-visible,[tabindex]:focus-visible{outline:4px solid #ffd34e;outline-offset:3px}
.app{max-width:1080px;margin:auto;padding:16px 14px 80px}.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:12px;padding:10px 14px;margin:0 -2px 14px;background:rgba(248,252,255,.91);backdrop-filter:blur(14px);border:1px solid rgba(18,101,172,.12);border-radius:20px;box-shadow:0 8px 26px rgba(31,82,123,.09)}
.brand{display:flex;align-items:center;gap:10px;min-width:0}.factory-mark{width:46px;height:46px;border-radius:14px;background:linear-gradient(145deg,#1d83df,#0d5da8);color:#fff;display:grid;place-items:center;font-size:25px;box-shadow:inset 0 -4px 0 rgba(0,0,0,.12)}.brand h1{font-size:clamp(18px,4vw,25px);margin:0;line-height:1.05}.brand small{display:block;color:var(--muted);font-size:11px;margin-top:4px}.top-actions{margin-left:auto;display:flex;gap:8px}.icon-btn{width:43px;height:43px;border:1px solid #c4ddf1;background:#fff;border-radius:14px;cursor:pointer;color:var(--blue2);font-size:20px;box-shadow:0 4px 10px rgba(32,83,121,.08)}
.panel{background:rgba(255,255,255,.95);border:1.5px solid #c9e0f2;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.hero{display:grid;grid-template-columns:1.25fr .75fr;gap:18px;padding:26px;position:relative}.hero:before{content:"";position:absolute;left:0;right:0;bottom:0;height:8px;background:repeating-linear-gradient(90deg,#184f82 0 25px,#ffc93d 25px 50px)}.eyebrow{display:inline-flex;align-items:center;gap:7px;background:#e7f4ff;color:#0a5da4;border-radius:999px;padding:7px 12px;font-weight:800;font-size:13px}.hero h2{font-size:clamp(29px,6vw,54px);line-height:1.08;margin:14px 0 12px;letter-spacing:-.04em}.hero h2 em{font-style:normal;color:var(--blue)}.hero p{font-weight:700;line-height:1.8;color:#486278;margin:0 0 20px}.cta{border:0;border-radius:17px;padding:15px 22px;background:linear-gradient(180deg,#1c82dc,#0c62af);color:#fff;font-weight:900;font-size:17px;cursor:pointer;box-shadow:0 8px 0 #084d89,0 14px 25px rgba(13,93,168,.25);transform:translateY(0)}.cta:active{transform:translateY(5px);box-shadow:0 3px 0 #084d89}.hero-worker{display:flex;align-items:end;justify-content:center;min-height:265px;position:relative}.hero-worker img{height:260px;filter:drop-shadow(0 18px 16px rgba(22,58,88,.18));animation:float 3s ease-in-out infinite}.hero-worker:before{content:"S V O C";position:absolute;top:12px;left:50%;transform:translateX(-50%);white-space:nowrap;font-weight:1000;letter-spacing:.25em;color:#c4dcf1;font-size:32px}.belt{position:absolute;bottom:18px;width:95%;height:40px;border:4px solid #365a74;border-radius:13px;background:repeating-linear-gradient(90deg,#cdd8df 0 30px,#edf3f7 30px 60px);box-shadow:inset 0 -8px 0 #9bb0bf}
@keyframes float{50%{transform:translateY(-8px)}}
.dashboard{margin-top:16px;padding:18px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center}.progress-wrap{height:16px;background:#e6eef5;border-radius:999px;overflow:hidden;border:1px solid #cdddea}.progress-bar{height:100%;width:0;background:linear-gradient(90deg,#45b778,#1e85d8);transition:.6s}.stats{display:flex;gap:9px;flex-wrap:wrap;margin-top:9px}.stat{background:#f4f9fd;border:1px solid #d8e7f2;border-radius:999px;padding:7px 11px;font-weight:800;font-size:13px}.rank{font-weight:1000;color:#0e65ae;background:#e6f3ff;border:1px solid #b8d9f4;padding:12px 16px;border-radius:16px;text-align:center}
.section-title{margin:28px 4px 13px;display:flex;align-items:end;justify-content:space-between;gap:12px}.section-title h3{margin:0;font-size:24px}.section-title p{margin:0;color:var(--muted);font-size:13px;font-weight:700}.lines{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.line-card{background:#fff;border:2px solid #d5e6f3;border-radius:22px;padding:18px;cursor:pointer;min-height:180px;position:relative;overflow:hidden;transition:.2s;box-shadow:0 10px 25px rgba(34,75,106,.08)}.line-card:hover{transform:translateY(-4px);border-color:#69aee5}.line-card .num{font-size:12px;font-weight:1000;color:#fff;background:var(--blue);padding:5px 9px;border-radius:999px;display:inline-block}.line-card h4{font-size:21px;margin:12px 0 8px}.line-card p{font-size:13px;line-height:1.65;color:#5a7184;margin:0;max-width:78%}.line-card img{position:absolute;height:126px;right:-18px;bottom:-13px;opacity:.96}.line-card.advanced .num{background:var(--purple)}.line-card.advanced{background:linear-gradient(145deg,#fff,#f8f4ff)}
.levels{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.level{border:2px solid #d7e5ef;background:#fff;border-radius:19px;padding:15px;cursor:pointer;text-align:left;min-height:140px;position:relative;transition:.2s;box-shadow:0 7px 18px rgba(33,70,100,.07)}.level:hover{transform:translateY(-3px);border-color:#72b4e6}.level.locked{filter:grayscale(.8);opacity:.65}.level .lv{font-size:12px;font-weight:1000;color:#fff;background:#176fc2;border-radius:9px;padding:5px 8px;display:inline-block}.level h5{font-size:16px;margin:10px 0 7px}.level p{font-size:12px;line-height:1.5;color:#668092;margin:0}.ok{position:absolute;right:9px;top:9px;background:#daf7e8;color:#188550;font-size:11px;font-weight:1000;border:1px solid #91dcb5;border-radius:999px;padding:5px 8px}.stars{position:absolute;bottom:10px;right:12px;color:#f6b719;font-size:16px;letter-spacing:1px}
.game{display:none}.game.active{display:block}.home.hidden{display:none}.game-head{padding:18px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center}.back{border:1px solid #c9dfef;background:#fff;border-radius:13px;padding:10px 13px;cursor:pointer;font-weight:900;color:#1767aa}.stage-meta small{font-weight:900;color:#1d72b9}.stage-meta h2{margin:3px 0 0;font-size:21px}.counter{font-weight:1000;background:#eef6fc;border-radius:12px;padding:10px}.lesson{margin-top:12px;padding:20px}.lesson-grid{display:grid;grid-template-columns:1fr 180px;gap:18px;align-items:center}.lesson h3{margin:0 0 8px;font-size:20px}.lesson p{margin:0;color:#526c7f;line-height:1.75;font-weight:700}.lesson img{height:155px;justify-self:center}.mini-rule{margin-top:12px;display:flex;gap:7px;flex-wrap:wrap}.badge{border-radius:9px;padding:6px 9px;font-weight:1000;font-size:12px;border:1px solid}.s{color:#0c65b2;background:#e6f3ff;border-color:#9cccf2}.v{color:#c12d3c;background:#ffeaed;border-color:#f5a6ae}.o{color:#167844;background:#e5f8ed;border-color:#9cdab7}.c{color:#6933b2;background:#f1e9ff;border-color:#c5abef}.h{color:#9a6c00;background:#fff5d5;border-color:#efd26b}
.question{margin-top:12px;padding:22px}.prompt-label{font-size:12px;font-weight:1000;color:#fff;background:#445f74;border-radius:8px;padding:5px 8px;display:inline-block}.jp{font-size:15px;color:#5f7487;font-weight:700;margin:12px 0 4px}.sentence{font-size:clamp(25px,6vw,40px);font-weight:1000;line-height:1.55;word-break:keep-all;margin:8px 0 17px;padding:16px;background:#f8fbfd;border:2px dashed #c9dfef;border-radius:18px;text-align:center;min-height:86px}.token{display:inline-block;margin:3px;padding:2px 7px;border-radius:8px;border-bottom:5px solid transparent}.token.S{background:#e4f2ff;color:#095ea5;border-color:var(--blue)}.token.V{background:#ffe9ec;color:#b92636;border-color:var(--red)}.token.O{background:#e5f8ed;color:#14723f;border-color:var(--green)}.token.C{background:#f0e8ff;color:#6530ac;border-color:var(--purple)}.token.H{background:#fff3c9;color:#8c6200;border-color:var(--yellow)}.blank{display:inline-block;min-width:92px;border-bottom:5px solid #8198aa;color:#61798d;padding:0 9px}.blank.filled{color:inherit}
.options{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}.choice{min-height:58px;border:2px solid #cddfeb;background:#fff;border-radius:15px;padding:11px;cursor:pointer;font-weight:1000;font-size:18px;box-shadow:0 5px 0 #d6e3ec;transition:.15s}.choice:hover{border-color:#6eb0e1;transform:translateY(-2px)}.choice.selected{background:#e6f3ff;border-color:#1675d1;box-shadow:0 5px 0 #8abfe6}.choice.used{opacity:.35;pointer-events:none}.answer-zone{min-height:72px;padding:10px;border:2px dashed #aac8dd;border-radius:16px;background:#f7fbfe;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:12px}.answer-chip{border:2px solid #7faac9;background:#fff;border-radius:12px;padding:10px 13px;font-weight:1000;cursor:pointer;box-shadow:0 4px 0 #c7d9e6}.sort-label{font-size:12px;color:#668092;font-weight:900;text-align:center;margin:0 0 8px}.actions{display:flex;gap:10px;margin-top:16px;position:sticky;bottom:10px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);padding:10px;border-radius:18px;border:1px solid #d6e5ef;z-index:10}.check{flex:1;border:0;border-radius:14px;padding:14px;background:linear-gradient(#197bd1,#0d61ad);color:#fff;font-weight:1000;font-size:17px;cursor:pointer;box-shadow:0 6px 0 #084c86}.reset{border:1px solid #bdd5e6;border-radius:14px;padding:12px 16px;background:#fff;color:#456277;font-weight:900;cursor:pointer}.feedback{display:none;margin-top:15px;border-radius:18px;padding:16px;font-weight:800;line-height:1.65}.feedback.show{display:block}.feedback.good{background:#e7f8ef;border:2px solid #68c693;color:#176c42}.feedback.bad{background:#fff0f1;border:2px solid #f39da5;color:#9f2632}.next{display:none;width:100%;margin-top:12px;border:0;border-radius:16px;background:#23a465;color:white;padding:15px;font-size:17px;font-weight:1000;cursor:pointer;box-shadow:0 6px 0 #167244}.next.show{display:block}
.modal{position:fixed;inset:0;background:rgba(9,30,49,.72);z-index:100;display:none;place-items:center;padding:15px}.modal.show{display:grid}.modal-card{background:#fff;border-radius:24px;max-width:780px;width:100%;max-height:92vh;overflow:auto;position:relative;padding:18px;box-shadow:0 30px 90px rgba(0,0,0,.35)}.modal-card img{width:100%;border-radius:15px}.close{position:sticky;top:0;float:right;z-index:2;border:0;background:#183f5f;color:#fff;width:42px;height:42px;border-radius:50%;font-size:20px;cursor:pointer}.clear-card{text-align:center;padding:38px 20px}.clear-card .big{font-size:70px}.clear-card h2{font-size:30px;margin:5px}.confetti{position:fixed;inset:0;pointer-events:none;z-index:150}.toast{position:fixed;left:50%;bottom:25px;transform:translateX(-50%) translateY(100px);background:#183f5f;color:#fff;padding:12px 18px;border-radius:999px;font-weight:900;z-index:200;transition:.3s}.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:780px){.hero{grid-template-columns:1fr;padding:20px}.hero-worker{min-height:205px}.hero-worker img{height:205px}.lines{grid-template-columns:1fr}.levels{grid-template-columns:repeat(2,1fr)}.dashboard{grid-template-columns:1fr}.lesson-grid{grid-template-columns:1fr 110px}.lesson img{height:125px}.brand small{display:none}.top-actions .hide-mobile{display:none}}
@media(max-width:430px){.app{padding:8px 8px 70px}.topbar{border-radius:16px}.hero h2{font-size:34px}.levels{grid-template-columns:1fr 1fr}.level{padding:12px;min-height:135px}.sentence{font-size:25px;padding:11px}.question{padding:15px}.lesson{padding:15px}.lesson-grid{grid-template-columns:1fr}.lesson img{display:none}.game-head{grid-template-columns:auto 1fr}.counter{grid-column:2;text-align:right;padding:0;background:none}.actions{bottom:5px}}

/* ===== 元デザインを保った、超スモールステップUI ===== */
.step-coach{margin:0 0 14px;padding:14px 15px;border:1.5px solid #c9e0f2;border-radius:18px;background:linear-gradient(180deg,#f4faff,#fff);box-shadow:0 7px 18px rgba(33,70,100,.06)}
.step-coach-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}.step-coach-head strong{font-size:15px}.step-chip{font-size:11px;font-weight:1000;color:#0e65ae;background:#e6f3ff;border:1px solid #b8d9f4;border-radius:999px;padding:5px 8px}
.step-list{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.step-item{border:1px solid #d7e7f3;background:#fff;border-radius:13px;padding:9px;min-height:82px}.step-item b{display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:4px}.step-num{width:22px;height:22px;display:inline-grid;place-items:center;border-radius:50%;background:#1675d1;color:#fff;font-size:11px}.step-item span{display:block;color:#62798b;font-weight:700;font-size:11px;line-height:1.45}
.worker-note{display:flex;align-items:center;gap:10px;margin:11px 0 0;padding:10px;border-radius:15px;background:#fff8df;border:1px solid #efd38a;color:#6d4b00;font-weight:800;font-size:12px;line-height:1.55}.worker-note img{width:44px;height:58px;object-fit:contain;flex:0 0 auto}
.branch-game{padding-top:2px}.branch-guide{font-weight:900;color:#49657a;text-align:center;margin:0 0 10px;line-height:1.6;font-size:13px}.branch-machine{border:2px solid #cbdfea;border-radius:20px;background:linear-gradient(180deg,#f8fcff,#eef6fb);padding:13px;overflow:hidden}.branch-arrival{text-align:center;font-size:11px;color:#668092;font-weight:1000;letter-spacing:.06em}
.subject-part{width:min(320px,92%);margin:8px auto 13px;padding:14px 12px;border:2px solid #c6dceb;background:#fff;border-radius:17px;box-shadow:0 7px 0 #d7e5ef,0 12px 24px rgba(33,70,100,.08);text-align:center;cursor:grab;touch-action:none;transition:.16s;position:relative;z-index:3}.subject-part.selected{border-color:#ffd34e;box-shadow:0 0 0 5px rgba(255,211,78,.3),0 7px 0 #d7e5ef;transform:translateY(-2px)}.subject-part.dragging{opacity:.65;transform:scale(.98)}.subject-part .main{font-size:30px;font-weight:1000;line-height:1.15}.subject-part small{display:block;color:#6b8193;font-size:12px;font-weight:800;margin-top:5px}
.mini-belt{height:31px;margin:0 -13px;background:repeating-linear-gradient(90deg,#aebdca 0 25px,#dce5ec 25px 50px);border-top:4px solid #49657a;border-bottom:4px solid #49657a;animation:miniBelt 1.1s linear infinite}@keyframes miniBelt{to{background-position:50px 0}}
.branch-neck{width:16px;height:27px;margin:auto;background:#7f96a8}.branch-path{position:relative;height:42px;margin:0 7% -2px}.branch-path:before,.branch-path:after{content:"";position:absolute;top:3px;height:5px;background:#8ea3b3;border-radius:999px}.branch-path.two:before{left:14%;right:50%;transform:rotate(18deg)}.branch-path.two:after{left:50%;right:14%;transform:rotate(-18deg)}.branch-path.three:before{left:3%;right:49%;transform:rotate(15deg)}.branch-path.three:after{left:49%;right:3%;transform:rotate(-15deg)}.branch-path.three i{position:absolute;width:5px;height:40px;left:calc(50% - 2px);top:0;background:#8ea3b3;border-radius:999px}
.intakes{display:grid;gap:8px}.intakes.two{grid-template-columns:repeat(2,1fr)}.intakes.three{grid-template-columns:repeat(3,1fr)}
.intake{min-height:150px;border:2px solid #cddfeb;background:#fff;border-radius:18px;padding:10px 5px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;text-align:center;box-shadow:0 6px 0 #dbe6ee;transition:.16s;position:relative}.intake:hover,.intake.drop-over{transform:translateY(-3px);border-color:#69aee5;box-shadow:0 0 0 5px rgba(105,174,229,.18),0 6px 0 #dbe6ee}.intake img{height:60px;width:58px;object-fit:contain;margin:4px 0}.intake .gate-label{font-size:24px;font-weight:1000;line-height:1}.intake .gate-help{font-size:10px;line-height:1.45;color:#678092;font-weight:800;margin-top:5px}
.intake.am{background:#fff1f3;border-color:#f5b3ba}.intake.are{background:#eaf5ff;border-color:#9cccf2}.intake.is{background:#f3edff;border-color:#c5abef}.intake.base{background:#eaf5ff;border-color:#9cccf2}.intake.spart{background:#eaf9f0;border-color:#9cdab7}
.branch-feedback{margin-top:11px;border-radius:16px;padding:12px;background:#fff;border:1px solid #d5e4ef;color:#526c7f;font-weight:800;line-height:1.65;font-size:13px}.branch-feedback.good{background:#e8f8ef;border-color:#a9dfbf;color:#126d3d}.branch-feedback.bad{background:#fff0f1;border-color:#f3b6bc;color:#9e2633}.branch-example{margin-top:8px;padding:9px 10px;border-radius:13px;background:#fff8df;border:1px solid #efd38a;text-align:center;font-weight:1000}
.lonely-box{margin:0 0 10px;padding:12px 13px;border-radius:16px;background:#f4efff;border:1px solid #cbb8ed;color:#59349a;font-size:12px;font-weight:800;line-height:1.65}.lonely-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}.lonely-tags span{background:#fff;border:1px solid #cbb8ed;border-radius:999px;padding:4px 8px}
.branch-progress{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px}.branch-progress strong{font-size:13px}.branch-dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}.branch-dots i{width:10px;height:10px;border-radius:50%;background:#d8e4ec}.branch-dots i.done{background:#36a96b}.branch-dots i.now{background:#f5b82e;box-shadow:0 0 0 3px rgba(245,184,46,.22)}
.branch-complete{text-align:center;padding:18px 8px}.branch-complete .big{font-size:48px}.branch-complete h3{margin:7px 0}.branch-complete p{color:#5f7487;font-weight:700;line-height:1.7}.branch-next{border:0;border-radius:15px;padding:13px 18px;background:linear-gradient(#40b675,#268d58);color:#fff;font-weight:1000;cursor:pointer;box-shadow:0 6px 0 #17653e}
.level.return-focus{animation:returnFocus 1s ease 2;box-shadow:0 0 0 7px rgba(255,211,78,.32),0 7px 18px rgba(33,70,100,.07)}@keyframes returnFocus{50%{transform:translateY(-4px) scale(1.015)}}
@media(max-width:650px){.step-list{grid-template-columns:1fr}.step-item{min-height:auto}.intakes{gap:6px}.intake{min-height:135px;padding:8px 3px}.intake img{height:51px;width:48px}.intake .gate-label{font-size:20px}.intake .gate-help{font-size:9px}.subject-part .main{font-size:26px}}

</style>
</head>
<body>
<canvas id="confetti" class="confetti"></canvas>
<div class="app">
<header class="topbar">
  <div class="brand"><div class="factory-mark">🏭</div><div><h1>文法工場</h1><small>英文の部品を見つけて、組み立てる</small></div></div>
  <div class="top-actions"><button class="icon-btn hide-mobile" id="soundBtn" aria-label="音のオンオフ">🔊</button><button class="icon-btn" id="resetProgress" aria-label="進捗をリセット">↻</button></div>
</header>
<main id="home" class="home">
<section class="panel hero">
 <div><span class="eyebrow">🔧 中学基礎 → 高校受験まで</span><h2>英文を、<em>部品</em>で<br>見抜けるようになる。</h2><p>「なんとなく読む」を卒業。S・V・O・Cとお助けパーツを、仕分け・検品・組み立てしながら体で覚えよう。</p><button class="cta" id="startBtn">生産ラインを動かす</button></div>
 <div class="hero-worker"><div class="belt"></div><img src="assets/1.png" alt="S担当の工場作業員"></div>
</section>
<section class="panel dashboard">
 <div><strong>工場の生産進捗</strong><div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div><div class="stats"><span class="stat" id="doneStat">検品OK 0 / 16</span><span class="stat" id="starStat">★ 0</span><span class="stat" id="accuracyStat">正答率 --</span></div></div><div class="rank" id="rank">見習い作業員</div>
</section>
<div class="section-title" id="lines"><div><h3>生産ライン</h3><p>基礎から順番に進むと、入試文まで迷子になりにくい。</p></div></div>
<section class="lines">
 <button class="line-card" data-scroll="basic"><span class="num">LINE 1</span><h4>部品発見ライン</h4><p>日本語の分解から、S・V・O・C、疑問文、組み立てへ。</p><img src="assets/2.png" alt="V担当"></button>
 <button class="line-card" data-scroll="change"><span class="num">LINE 2</span><h4>形チェンジ工場</h4><p>代名詞・be動詞・三単現・疑問詞を、文型と一緒に練習。</p><img src="assets/3.png" alt="O担当"></button>
 <button class="line-card advanced" data-scroll="exam"><span class="num">LINE 3</span><h4>入試解析ライン</h4><p>受動態・不定詞・分詞・関係代名詞・長文の骨組みを検品。</p><img src="assets/4.png" alt="C担当"></button>
</section>
<div id="levelMount"></div>

function openLevel(id){state.level=id;state.q=0;state.branchIndex=0;state.branchSelected=false;state.branchDone=false;$('#home').classList.add('hidden');$('#game').classList.add('active');const l=levels[id];$('#stageLine').textContent=l.line;$('#stageTitle').textContent=`Lv.${id} ${l.title}`;$('#lessonTitle').textContent=l.desc;$('#lessonText').textContent=l.lesson;$('#workerImg').src=`assets/${l.worker}.png`;$('#miniRule').innerHTML=l.rule.map(([a,b])=>`<span class="badge ${COLORS[b]||'h'}">${a}：${b}</span>`).join('');if(l.comic&&!progress['comicSeen']){progress.comicSeen=true;save();$('#comicModal').classList.add('show')}renderQuestion();window.scrollTo({top:0,behavior:'smooth'})}

function phaseInfo(){const total=levels[state.level].qs.length;if(state.q===0)return ['① 見本','まずは見ながら、同じ考え方をまねします。'];if(state.q===total-1)return ['③ ひとりで','最後は自分で検品。ヒントを使っても合格です。'];return ['② まねっこ','さっきと少しだけ違う文で練習します。']}
function coachSteps(q){if(q.type==='branch'&&q.kind==='be')return [['主語だけを見る','文の残りはまだ見なくてOK。'],['仲間を決める','I／you・we・they・複数／1人・1つ。'],['搬入口へ運ぶ','am・are・isのどれかへ。']];if(q.type==='branch'&&q.kind==='s')return [['主語だけを見る','動詞はまだ変えなくてOK。'],['ひとり・ひとつ？','he・she・it・名前1人・もの1つを探す。'],['sをどうぞ','さみしがりやなら＋sへ。']];if(q.type==='label')return [['中心のV','まず動詞だけ探します。'],['だれが？','Vの主役をSにします。'],['相手か説明か','動きの相手はO、＝の説明はC。']];if(q.type==='order')return [['主役S','だれが・なにがを最初に。'],['中心V','次に動き・状態を置きます。'],['残りの部品','O・C・お助けを順に足します。']];return [['空欄の役割','S・V・O・Cのどこか確認。'],['主語を見る','形が変わる問題は主語が合図。'],['選んで読む','文全体を声に出して確認。']]}
function renderCoach(q){const [phase,msg]=phaseInfo();$('#stepPhase').textContent=phase;$('#stepList').innerHTML=coachSteps(q).map((x,i)=>`<div class="step-item"><b><span class="step-num">${i+1}</span>${x[0]}</b><span>${x[1]}</span></div>`).join('');$('#coachWorker').src=`assets/${levels[state.level].worker}.png`;$('#coachMessage').textContent=msg+' 分からないときは、答えを見ながら同じ形にして大丈夫です。'}
function branchGates(q){if(q.kind==='be')return [{id:'am',label:'am',help:'Iだけ',img:2},{id:'are',label:'are',help:'you / we / they・複数',img:1},{id:'is',label:'is',help:'he / she / it・1人・1つ',img:4}];return [{id:'base',label:'原形',help:'I / you / we / they・複数',img:1},{id:'spart',label:'＋ s',help:'he / she / it・名前1人・もの1つ',img:2}]}
function renderBranch(q){const i=$('#interaction'),card=q.cards[state.branchIndex],gates=branchGates(q),three=gates.length===3;if(state.branchDone){i.innerHTML=`<div class="branch-complete"><div class="big">🎉</div><h3>仕分けライン、検品OK！</h3><p>${q.ex}<br>次は、同じ考え方を英文の空欄で使います。</p><button class="branch-next" id="branchNextBtn">英文問題へ進む →</button></div>`;$('#branchNextBtn').onclick=()=>{$('#nextBtn').click()};return}const story=q.kind==='s'?`<div class="lonely-box"><strong>工場での覚え方：さみしがりやの三人称単数</strong><br>Iでもyouでもなく、ひとり・ひとつで立っている主語には、現在のふつうの文で動詞にsパーツをつけます。<div class="lonely-tags"><span>he</span><span>she</span><span>it</span><span>Ken</span><span>my mother</span><span>this dog</span></div></div>`:'';i.innerHTML=`<div class="branch-game">${story}<div class="branch-progress"><strong>仕分け ${state.branchIndex+1} / ${q.cards.length}</strong><span class="branch-dots">${q.cards.map((_,n)=>`<i class="${n<state.branchIndex?'done':n===state.branchIndex?'now':''}"></i>`).join('')}</span></div><p class="branch-guide">カードをつかんで搬入口へ運ぶか、カードをタップしてから搬入口をタップしてください。</p><div class="branch-machine"><div class="branch-arrival">ベルトコンベアから主語が到着</div><button class="subject-part ${state.branchSelected?'selected':''}" id="subjectPart" draggable="true"><span class="main">${card.text}</span><small>${card.meaning}</small></button><div class="mini-belt"></div><div class="branch-neck"></div><div class="branch-path ${three?'three':'two'}">${three?'<i></i>':''}</div><div class="intakes ${three?'three':'two'}">${gates.map(g=>`<button class="intake ${g.id}" data-gate="${g.id}"><span class="gate-label">${g.label}</span><img src="assets/${g.img}.png" alt=""><span class="gate-help">${g.help}</span></button>`).join('')}</div></div>${q.kind==='s'?`<div class="branch-example">今回の動詞：<strong>${card.verb}</strong>　→　どちらのライン？</div>`:''}<div class="branch-feedback" id="branchFeedback">まず主語カードを1枚だけ仕分けしよう。</div></div>`;const part=$('#subjectPart');part.onclick=()=>{state.branchSelected=!state.branchSelected;part.classList.toggle('selected',state.branchSelected)};part.ondragstart=e=>{part.classList.add('dragging');e.dataTransfer.setData('text/plain','subject')};part.ondragend=()=>part.classList.remove('dragging');document.querySelectorAll('[data-gate]').forEach(g=>{g.onclick=()=>{if(!state.branchSelected){state.branchSelected=true;part.classList.add('selected');$('#branchFeedback').textContent='主語カードを選びました。次に搬入口をタップしよう。';return}judgeBranch(q,g.dataset.gate)};g.ondragover=e=>{e.preventDefault();g.classList.add('drop-over')};g.ondragleave=()=>g.classList.remove('drop-over');g.ondrop=e=>{e.preventDefault();g.classList.remove('drop-over');judgeBranch(q,g.dataset.gate)}})}
function judgeBranch(q,gate){const card=q.cards[state.branchIndex],f=$('#branchFeedback');if(gate===card.answer){playCorrect();f.className='branch-feedback good';let reason=q.kind==='be'?(gate==='am'?'Iだけはam！':gate==='are'?'you・we・they・複数はare！':'1人・1つはis！'):(gate==='spart'?'ひとり・ひとつだから、sパーツをどうぞ！':'I・you・we・they・複数だから、原形のまま！');f.innerHTML=`✅ 検品OK！ ${reason}<div class="branch-example">${card.example}</div>`;state.branchSelected=false;setTimeout(()=>{state.branchIndex++;if(state.branchIndex>=q.cards.length){state.branchDone=true;$('#nextBtn').classList.add('show');$('#checkBtn').disabled=true}renderQuestion()},950)}else{playWrong();f.className='branch-feedback bad';f.innerHTML=q.kind==='be'?'🔧 主語だけ見よう。I→am、you・we・they・複数→are、1人・1つ→is。':'🔧 I・you・we・they・複数は原形。he・she・it・名前1人・もの1つは＋s。';state.branchSelected=true;$('#subjectPart')?.classList.add('selected')}}

function renderQuestion(){state.selected=null;state.order=[];state.labelChoices=[];const l=levels[state.level],q=l.qs[state.q];$('#counter').textContent=`${state.q+1} / ${l.qs.length}`;$('#jp').textContent=q.jp||'';$('#sentence').innerHTML=q.html?q.sentence:(q.sentence||'部品を正しく検品しよう');$('#feedback').className='feedback';$('#feedback').innerHTML='';$('#nextBtn').classList.remove('show');$('#checkBtn').disabled=false;renderCoach(q);const i=$('#interaction');$('.actions').style.display='flex';
 if(q.type==='branch'){renderBranch(q);$('.actions').style.display='none';if(state.branchDone)$('#nextBtn').classList.add('show');return}
 if(q.type==='choice'){i.innerHTML=`<div class="options">${q.opts.map(o=>`<button class="choice" data-choice="${esc(o)}">${o}</button>`).join('')}</div>`;i.querySelectorAll('.choice').forEach(b=>b.onclick=()=>{i.querySelectorAll('.choice').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');state.selected=b.dataset.choice})}
 if(q.type==='order'){i.innerHTML=`<p class="sort-label">上の部品置き場に、順番にタップして送ろう。置いた部品はタップで戻せます。</p><div class="answer-zone" id="answerZone">ここに組み立て</div><div class="options">${q.tokens.map((o,n)=>`<button class="choice" data-token="${n}">${o}</button>`).join('')}</div>`;bindOrder(q)}
 if(q.type==='label'){i.innerHTML=`<p class="sort-label">各部品の役割を、左から順番に選ぼう。</p><div class="answer-zone" id="labelZone">${q.parts.map((p,n)=>`<button class="answer-chip" data-part="${n}">${p}<small style="display:block;color:#789">未検品</small></button>`).join('')}</div><div class="options">${['S','V','O','C','H'].map(x=>`<button class="choice" data-label="${x}">${x}${x==='H'?' お助け':''}</button>`).join('')}</div>`;let active=0;const chips=i.querySelectorAll('[data-part]');chips.forEach(c=>c.onclick=()=>{active=+c.dataset.part;chips.forEach(x=>x.style.outline='');c.style.outline='4px solid #ffd34e'});chips[0].click();i.querySelectorAll('[data-label]').forEach(b=>b.onclick=()=>{state.labelChoices[active]=b.dataset.label;chips[active].querySelector('small').textContent=b.dataset.label;chips[active].className=`answer-chip ${COLORS[b.dataset.label]||''}`;if(active<chips.length-1){active++;chips[active].click()}})}
}
function bindOrder(q){const i=$('#interaction'),zone=i.querySelector('#answerZone');i.querySelectorAll('[data-token]').forEach(b=>b.onclick=()=>{const n=+b.dataset.token;if(state.order.includes(n))return;state.order.push(n);b.classList.add('used');drawOrder()});function drawOrder(){zone.innerHTML=state.order.length?'':'ここに組み立て';state.order.forEach(n=>{const c=document.createElement('button');c.className='answer-chip';c.textContent=q.tokens[n];c.onclick=()=>{state.order=state.order.filter(x=>x!==n);i.querySelector(`[data-token="${n}"]`).classList.remove('used');drawOrder()};zone.appendChild(c)})}}
function check(){const q=levels[state.level].qs[state.q];if(q.type==='branch')return;let ok=false;if(q.type==='choice')ok=state.selected===q.ans;if(q.type==='order')ok=JSON.stringify(state.order.map(n=>q.tokens[n]))===JSON.stringify(q.ans);if(q.type==='label')ok=JSON.stringify(state.labelChoices)===JSON.stringify(q.labels);state.attempts++;q._tries=(q._tries||0)+1;if(ok)state.correct++;save();const f=$('#feedback');f.classList.add('show',ok?'good':'bad');if(ok){f.innerHTML=`✅ <strong>出荷OK！</strong><br>${q.ex}`;playCorrect();$('#nextBtn').classList.add('show');$('#checkBtn').disabled=true;setTimeout(()=>$('#nextBtn').scrollIntoView({behavior:'smooth',block:'center'}),120)}else{let extra=q._tries>=3?`<br><strong>答えを見ながら同じ形にしてOKです。</strong><br>${answerGuide(q)}`:q._tries===2?`<br>${q.ex||''}`:'';f.innerHTML=`🔧 <strong>まだ途中で大丈夫。</strong><br>${hint(q)}${extra}`;playWrong()}updateDashboard()}
function answerGuide(q){if(q.type==='choice')return `正解は「${q.ans}」です。`;if(q.type==='order')return `正しい順番：${q.ans.join(' → ')}`;if(q.type==='label')return q.parts.map((p,i)=>`${p}＝${q.labels[i]}`).join('／');return ''}
function hint(q){if(q.type==='label')return '中心のVを最初に探し、次に「誰が」「何を」「＝の説明」を確認しよう。';if(q.type==='order')return 'まずS、その次に中心V。疑問文なら先頭に出るパーツを確認しよう。';return '日本語の意味と、文の中の置き場所をもう一度確認しよう。'}
function next(){const l=levels[state.level];if(state.q<l.qs.length-1){state.q++;state.branchIndex=0;state.branchSelected=false;state.branchDone=false;renderQuestion();$('#questionBox').scrollIntoView({behavior:'smooth',block:'start'})}else{progress[state.level]={done:true,date:Date.now()};save();playClear();confetti();$('#clearText').textContent=`Lv.${l.id}「${l.title}」の生産ラインをすべて通過しました。`;$('#clearModal').classList.add('show');renderLevels()}}
function backHome(returnToLevel=false){$('#game').classList.remove('active');$('#home').classList.remove('hidden');if(returnToLevel)state.returnLevel=state.level;renderLevels();if(!returnToLevel)window.scrollTo({top:0,behavior:'smooth'})}
function resetQuestion(){renderQuestion()}
function esc(s){return String(s).replace(/"/g,'&quot;')}
function audioCtx(){return window._ac||(window._ac=new (window.AudioContext||window.webkitAudioContext)())}
function tone(freq,start,dur,type='sine',gain=.12){if(!state.sound)return;const ac=audioCtx(),o=ac.createOscillator(),g=ac.createGain();o.type=type;o.frequency.setValueAtTime(freq,ac.currentTime+start);g.gain.setValueAtTime(0,ac.currentTime+start);g.gain.linearRampToValueAtTime(gain,ac.currentTime+start+.015);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+start+dur);o.connect(g).connect(ac.destination);o.start(ac.currentTime+start);o.stop(ac.currentTime+start+dur)}
function playCorrect(){tone(659,0,.16,'sine',.13);tone(880,.15,.28,'sine',.15)}
function playWrong(){tone(240,0,.18,'square',.08);tone(180,.18,.28,'square',.07)}
function playClear(){[523,659,784,1046].forEach((f,i)=>tone(f,i*.11,.4,'triangle',.11));for(let i=0;i<8;i++)tone(300+Math.random()*900,.55+i*.06,.14,'square',.035)}
function confetti(){const c=$('#confetti'),x=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;let bits=Array.from({length:140},()=>({x:Math.random()*c.width,y:-20-Math.random()*c.height*.5,vx:-2+Math.random()*4,vy:2+Math.random()*5,r:3+Math.random()*6,a:Math.random()*6.28,h:Math.random()*360}));let t=0;(function draw(){x.clearRect(0,0,c.width,c.height);bits.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.a+=.12;x.save();x.translate(b.x,b.y);x.rotate(b.a);x.fillStyle=`hsl(${b.h} 85% 55%)`;x.fillRect(-b.r,-b.r/2,b.r*2,b.r);x.restore()});if(t++<170)requestAnimationFrame(draw);else x.clearRect(0,0,c.width,c.height)})()}
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600)}
$('#startBtn').onclick=()=>$('#lines').scrollIntoView({behavior:'smooth'});document.querySelectorAll('[data-scroll]').forEach(b=>b.onclick=()=>$('#'+b.dataset.scroll).scrollIntoView({behavior:'smooth'}));$('#backBtn').onclick=backHome;$('#retryBtn').onclick=resetQuestion;$('#checkBtn').onclick=check;$('#nextBtn').onclick=next;$('#returnLevels').onclick=()=>{$('#clearModal').classList.remove('show');backHome(true)};document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>$('#'+b.dataset.close).classList.remove('show'));$('#soundBtn').onclick=()=>{state.sound=!state.sound;$('#soundBtn').textContent=state.sound?'🔊':'🔇';save();toast(state.sound?'音をオンにしました':'音をオフにしました')};$('#soundBtn').textContent=state.sound?'🔊':'🔇';$('#resetProgress').onclick=()=>{if(confirm('すべての検品記録をリセットしますか？')){Object.keys(progress).forEach(k=>delete progress[k]);state.attempts=0;state.correct=0;save();renderLevels();toast('進捗をリセットしました')}};
renderLevels();
</script>
</body>
</html>
